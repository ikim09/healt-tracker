
workflows:
  ios-release:
    name: HealthTracker iOS Release
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic Admin
    environment:
      node: 22.12.0
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.ikim.healthtracker
    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web app
        script: npm run build

      - name: Capacitor CLI
        script: npm install -g @capacitor/cli

      - name: Add iOS
        script: |
          npm install @capacitor/ios
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync
        script: npx cap sync ios

      - name: CocoaPods
        script: |
          find ios -name "Podfile" -execdir pod install \;

      - name: Set up keychain
        script: keychain initialize

      - name: Create distribution certificate
        script: |
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --save || echo "Certificato gia' esistente, procedo"

      - name: Fetch or create certificates
        script: |
          app-store-connect certificates list \
            --type IOS_DISTRIBUTION \
            --certificate-key=@file:$CM_BUILD_DIR/private_key \
            --save || true

      - name: Create provisioning profile
        script: |
          app-store-connect profiles create \
            --type IOS_APP_STORE \
            --bundle-id-identifier "com.ikim.healthtracker" \
            --save || echo "Profilo gia' esistente, procedo"

      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "com.ikim.healthtracker" \
            --type IOS_APP_STORE \
            --create

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Apply profiles
        script: xcode-project use-profiles

      - name: Set build number
        script: |
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          agvtool new-version -all $BUILD_NUMBER
        working_directory: ios/App

      - name: Build IPA
        script: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -type d | head -1)
          echo "Uso workspace: $WORKSPACE"
          xcode-project build-ipa --workspace "$WORKSPACE" --scheme App

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false