workflows:
  ios-release:
    name: HealthTracker iOS Release
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic Admin
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ikim.healthtracker
      node: 22.12.0
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.ikim.healthtracker
    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web app
        script: npm run build

      - name: Capacitor CLI
        script: npm install -g @capacitor/cli

      - name: Add iOS
        script: |
          npm install @capacitor/ios
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync
        script: npx cap sync ios

      - name: Set iPhone only and clean entitlements
        script: |
          sed -i '' 's/TARGETED_DEVICE_FAMILY = "1,2"/TARGETED_DEVICE_FAMILY = 1/g' ios/App/App.xcodeproj/project.pbxproj
          echo "App impostata come solo iPhone"
          echo "===== FILE ENTITLEMENTS TROVATI ====="
          find ios -name "*.entitlements"
          echo "====================================="
          for f in $(find ios -name "*.entitlements"); do
            echo "Sovrascrivo con entitlements pulito: $f"
            cat > "$f" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          </dict>
          </plist>
          EOF
            cat "$f"
          done

      - name: CocoaPods
        script: |
          find ios -name "Podfile" -execdir pod install \;

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Set build number
        script: |
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          agvtool new-version -all $BUILD_NUMBER
        working_directory: ios/App

      - name: Build IPA
        script: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -type d | head -1)
          echo "Uso workspace: $WORKSPACE"
          xcode-project build-ipa --workspace "$WORKSPACE" --scheme App

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false


