


workflows:
  ios-release:
    name: HealthTracker iOS Release
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic Admin
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ikim.healthtracker
      node: 22.12.0
      xcode: latest
      cocoapods: default
      vars:
        APP_ID: com.ikim.healthtracker
    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web app
        script: npm run build

      - name: Capacitor CLI
        script: npm install -g @capacitor/cli

      - name: Add iOS
        script: |
          npm install @capacitor/ios
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync
        script: npx cap sync ios

      - name: CocoaPods
        script: |
          find ios -name "Podfile" -execdir pod install \;

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Set build number
        script: |
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          agvtool new-version -all $BUILD_NUMBER
        working_directory: ios/App

      - name: Build IPA
        script: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -type d | head -1)
          echo "Uso workspace: $WORKSPACE"
          xcode-project build-ipa --workspace "$WORKSPACE" --scheme App

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

